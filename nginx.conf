events {
    worker_connections 1024;
}

http {
    # Passive health check parameters:
    #   max_fails=2       — mark server unavailable after 2 consecutive errors
    #   fail_timeout=10s  — stay unavailable for 10 s, then probe once; if OK, re-enable
    #
    # During a rolling update, when api-01 restarts:
    #   1. Connection refused → counts as 1 fail
    #   2. proxy_next_upstream retries the same request on api-02 (transparent to user)
    #   3. After 2 fails, api-01 is marked unavailable; all traffic goes to api-02
    #   4. New api-01 starts; after fail_timeout nginx re-probes and re-enables it
    #
    # ip_hash: keeps each client IP on the same backend (required for SignalR).
    # For Redis backplane + true round-robin, remove ip_hash.
    upstream aeromes_backend {
        ip_hash;
        server api-01:8080 max_fails=2 fail_timeout=10s;
        server api-02:8080 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;
        # Uncomment to enforce HTTPS:
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://aeromes_backend;
            proxy_http_version 1.1;

            # Fail over to the next upstream on connection errors or 50x responses.
            # This makes the retry during rolling updates transparent to the client.
            proxy_next_upstream       error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            # Detect a dead backend quickly so the retry is fast.
            proxy_connect_timeout 3s;

            # Required for WebSocket / SignalR upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep SignalR long-poll / SSE connections alive
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }
    }

    # HTTPS — mount certs into ./certs/ and uncomment:
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass              http://aeromes_backend;
    #         proxy_http_version      1.1;
    #         proxy_next_upstream     error timeout http_502 http_503 http_504;
    #         proxy_next_upstream_tries 2;
    #         proxy_connect_timeout   3s;
    #         proxy_set_header Upgrade    $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host               $host;
    #         proxy_set_header X-Real-IP          $remote_addr;
    #         proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto  https;
    #         proxy_read_timeout 300s;
    #     }
    # }
}
