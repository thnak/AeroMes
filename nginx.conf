events {
    worker_connections 1024;
}

http {
    # Upstream with sticky sessions for SignalR WebSocket connections.
    # ip_hash routes each client IP to the same backend instance.
    # Replace with round-robin (remove ip_hash) when using a Redis backplane.
    upstream aeromes_backend {
        ip_hash;
        server api-01:8080;
        server api-02:8080;
    }

    server {
        listen 80;
        # Uncomment to enforce HTTPS:
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://aeromes_backend;
            proxy_http_version 1.1;

            # Required for WebSocket / SignalR upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep SignalR long-poll / SSE connections alive
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }
    }

    # HTTPS — mount your certs into ./certs/
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://aeromes_backend;
    #         proxy_http_version 1.1;
