name: Build & Deploy

# Trigger: push a version tag (e.g. git tag v1.3.0 && git push --tags)
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build Docker image and push to GHCR ──────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ github.ref_name }}
      image:   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            COMMIT_SHA=${{ github.sha }}
          # Layer cache via GitHub Actions cache
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── SSH into the production server and run deploy.sh ─────────────────────────
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production   # requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          # Pass these as shell env vars; deploy.sh reads them.
          envs: REGISTRY,IMAGE_NAME,GITHUB_REF_NAME,GITHUB_SHA
          script: |
            cd /opt/aeromes
            IMAGE="$REGISTRY/$IMAGE_NAME" \
            TAG="$GITHUB_REF_NAME" \
            COMMIT_SHA="$GITHUB_SHA" \
            bash deploy.sh
