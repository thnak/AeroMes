# Development compose — single API instance + SQL Server
# Usage:
#   docker compose up -d
#
# To rebuild after code changes:
#   docker compose build api && docker compose up -d api

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AeroMes_Dev@2026"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AeroMes_Dev@2026' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles: ["search"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=AeroMes;User Id=sa;
        Password=AeroMes_Dev@2026;TrustServerCertificate=true;
      Jwt__Key: "dev-secret-change-in-production-min-32-chars"
      Jwt__Issuer: "aeromes-api"
      Jwt__Audience: "aeromes-web"
      Cors__Origins__0: "http://localhost:5173"
      APP_VERSION: "dev"
      BUILD_DATE: ""
      INSTANCE_ID: "api-dev"
    ports:
      - "5170:8080"

volumes:
  sqldata:
  esdata:
