# Development compose — single API instance + SQL Server
# Usage:
#   docker compose up -d
#
# To rebuild after code changes:
#   docker compose build api && docker compose up -d api

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AeroMes_Dev@2026"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AeroMes_Dev@2026' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # Optional S3-compatible object storage. The API defaults to Local disk storage;
  # set Storage__Provider=S3 (and the Storage__S3__* settings) to use this instead.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver;Database=AeroMes;User Id=sa;
        Password=AeroMes_Dev@2026;TrustServerCertificate=true;
      Jwt__Key: "dev-secret-change-in-production-min-32-chars"
      Jwt__Issuer: "aeromes-api"
      Jwt__Audience: "aeromes-web"
      Cors__Origins__0: "http://localhost:5173"
      APP_VERSION: "dev"
      BUILD_DATE: ""
      INSTANCE_ID: "api-dev"
    ports:
      - "5170:8080"

volumes:
  sqldata:
  miniodata:
